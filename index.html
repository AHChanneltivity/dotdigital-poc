<!DOCTYPE html>
    <html>
    <head>
    <style>
      body { font-family: sans-serif; padding: 2rem; }
      h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.5rem; }
      .snap { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
      .summary { display: flex; gap: 12px; margin-bottom: 1.5rem; }
      .metric { background: #f5f5f5; border-radius: 8px; padding: 1rem; min-width: 120px; }
      .metric-label { font-size: 12px; color: #888; margin: 0 0 4px; }
      .metric-value { font-size: 22px; font-weight: 500; margin: 0; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th { background: #f5f5f5; padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
      td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
      .bar-bg { background: #eee; border-radius: 4px; height: 6px; width: 100%; margin-top: 4px; }
      .bar-fill { height: 6px; border-radius: 4px; }
      .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
      .badge-silver { background: #D3D1C7; color: #444; }
      .badge-gold { background: #FAC775; color: #633806; }
      .badge-platinum { background: #CECBF6; color: #3C3489; }
    </style>
    </head>
    <body>
    <h1>Dotdigital Partner Tier Progress</h1>
    <p class="snap">Snapshot: June 2026</p>
    <div class="summary">
      <div class="metric"><p class="metric-label">Total Partners</p><p class="metric-value">1</p></div>
      <div class="metric"><p class="metric-label">Silver</p><p class="metric-value">1</p></div>
      <div class="metric"><p class="metric-label">Gold</p><p class="metric-value">0</p></div>
      <div class="metric"><p class="metric-label">Platinum</p><p class="metric-value">0</p></div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Partner</th>
          <th>Tier</th>
          <th>Next Tier</th>
          <th>Won Deals (Target)</th>
          <th>ACV (Target)</th>
          <th>Progress</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>ForrTech Int.</td>
          <td><span class="badge badge-silver">Silver</span></td>
          <td>Gold</td>
          <td>
            3 / 3
            <div class="bar-bg"><div class="bar-fill" style="width:100%;background:#1D9E75"></div></div>
          </td>
          <td>
            $214k / $100k
            <div class="bar-bg"><div class="bar-fill" style="width:100%;background:#378ADD"></div></div>
          </td>
          <td style="color:#1D9E75;font-weight:500">100%<br><small>0 deals to go</small></td>
        </tr></tbody>
    </table>
    </body>
    </html>
